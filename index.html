<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBJ | The Legacy</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #c5a059;
            --text-main: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 40px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
        }

        nav a { color: white; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; }

        header {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), #0a0a0a), url('Michael B_ Jordan.jpg');
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        h1 { font-size: 5rem; text-transform: uppercase; margin: 0; }

        .gallery {
            padding: 100px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery img {
            width: 100%; height: 450px;
            object-fit: cover;
            border-radius: 8px;
            transition: 0.5s;
        }

        .gallery img:hover { transform: scale(1.03); }

        .cta-section {
            padding: 100px;
            text-align: center;
            background: #111;
        }

        .btn {
            padding: 15px 40px;
            background: var(--accent-color);
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="journey.html">THE JOURNEY</a>
    </nav>

    <header>
        <div>
            <p style="letter-spacing: 5px; color: var(--accent-color);">OFFICIAL FAN EXPERIENCE</p>
            <h1>Michael B. Jordan</h1>
        </div>
    </header>

    <section class="gallery">
        <img src=" .jpg" alt="Editorial MBJ">
        <img src=" -2.jpg" alt="Red Carpet MBJ">
        <img src=" -4.jpg" alt="MBJ Smile">
    </section>

    <section class="cta-section">
        <h2>Want to talk to Michael?</h2>
        <p style="margin-bottom: 40px; color: #a0a0a0;">Experience our AI-powered Michael B. Jordan persona.</p>
        <a href="journey.html#talk" class="btn">START CONVERSATION</a>
    </section>

</body>
</html>
