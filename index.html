<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBJ | The Legacy</title>
    <style>
        /* --- STYLE.CSS (Editorial Dark Mode) --- */
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #c5a059; /* Gold accent */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), var(--bg-color)), 
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2000'); /* Placeholder: High-end Cinematic */
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-size: 5rem;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--accent-color);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Gallery Section */
        .gallery {
            padding: 100px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.5s;
            border-radius: 4px;
        }

        .gallery img:hover {
            filter: grayscale(0%);
            transform: scale(1.02);
        }

        /* AI Chat Widget */
        #chat-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 350px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: bold;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header span {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
        }

        #chat-box {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 10px;
            border-radius: 10px;
        }

        .user-msg { background: var(--accent-color); color: #000; align-self: flex-end; }
        .ai-msg { background: rgba(255,255,255,0.1); color: #fff; align-self: flex-start; }

        .chat-input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px;
            color: white;
            border-radius: 5px;
        }

        button {
            background: var(--accent-color);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Custom Scrollbar */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div>
            <p class="subtitle">Official Fan Experience</p>
            <h1>Michael B. Jordan</h1>
        </div>
    </header>

    <section class="gallery">
        <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=800" alt="Film">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=800" alt="Style">
        <img src="https://images.unsplash.com/photo-1492691523569-f152e75686f4?q=80&w=800" alt="Action">
    </section>

    <div id="chat-container">
        <div class="chat-header">
            <span></span> Chat with Michael
        </div>
        <div id="chat-box">
            <div class="msg ai-msg">Hey! It's Michael. Glad you're here. What's on your mind?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask about Creed, Anime, or Films...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        /* --- SCRIPT.JS (Cloudflare Connector) --- */
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();

            if (!message) return;

            // 1. Add User Message to UI
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user-msg';
            userDiv.innerText = message;
            chatBox.appendChild(userDiv);
            inputField.value = '';

            // 2. Add "Typing" indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'msg ai-msg';
            typingDiv.innerText = '...';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. Call your Cloudflare Worker
                const response = await fetch('https://mbjfansite.richurehan00.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.text();
                
                // 4. Update UI with AI response
                typingDiv.innerText = data;
            } catch (error) {
                typingDiv.innerText = "Sorry, I'm having trouble connecting right now.";
                console.error(error);
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Allow "Enter" key to send
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
