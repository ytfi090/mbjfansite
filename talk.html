<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat with MBJ</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        nav { text-align: center; margin-bottom: 30px; }
        nav a { color: #888; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .chat-box { max-width: 500px; margin: 0 auto; background: #111; border: 1px solid #333; border-radius: 15px; display: flex; flex-direction: column; height: 70vh; }
        #display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 10px 15px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
        .ai { background: #222; align-self: flex-start; }
        .user { background: #c5a059; color: #000; align-self: flex-end; font-weight: bold; }
        .input { padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; }
        button { background: #c5a059; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <nav><a href="index.html">HOME</a> <a href="journey.html">JOURNEY</a> <a href="talk.html" style="color:#c5a059">CHAT</a></nav>
    <div class="chat-box">
        <div id="display"><div class="m ai">Yo! Big love for the support on the Oscar win. What's on your mind?</div></div>
        <div class="input">
            <input type="text" id="userInput" placeholder="Say something..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()">SEND</button>
        </div>
    </div>
    <script>
        async function sendMsg() {
            const inp = document.getElementById('userInput');
            const disp = document.getElementById('display');
            const val = inp.value.trim();
            if(!val) return;

            disp.innerHTML += `<div class="m user">${val}</div>`;
            inp.value = '';
            disp.scrollTop = disp.scrollHeight;

            const tempId = "msg" + Date.now();
            disp.innerHTML += `<div class="m ai" id="${tempId}">...</div>`;

            try {
                const res = await fetch('https://mbjfansite.richurehan00.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });
                const text = await res.text();
                document.getElementById(tempId).innerText = text;
            } catch {
                document.getElementById(tempId).innerText = "Signal's weak on set. Try again?";
            }
            disp.scrollTop = disp.scrollHeight;
        }
    </script>
</body>
</html>
