<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Michael B. Jordan</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --received: #e9e9eb;
            --sent: #007aff;
            --sent-text: #ffffff;
            --header: #f2f2f2;
            --input-bg: #ffffff;
            --border: #dbdbdb;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --received: #262629;
            --sent: #007aff;
            --sent-text: #ffffff;
            --header: #1c1c1e;
            --input-bg: #1c1c1e;
            --border: #333333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background 0.3s ease;
        }

        /* Top Bar */
        .header {
            padding: 45px 20px 15px;
            text-align: center;
            background: var(--header);
            border-bottom: 0.5px solid var(--border);
            position: relative;
        }

        .header img {
            width: 50px; height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Toggle Button */
        #theme-toggle {
            position: absolute;
            top: 50px;
            right: 20px;
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Chat Thread */
        #chat-thread {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
        }

        .received {
            align-self: flex-start;
            background-color: var(--received);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .sent {
            align-self: flex-end;
            background-color: var(--sent);
            color: var(--sent-text);
            border-bottom-right-radius: 4px;
        }

        /* Input area */
        .input-wrap {
            padding: 15px;
            background: var(--bg);
            border-top: 0.5px solid var(--border);
            display: flex;
            gap: 10px;
            padding-bottom: 35px;
        }

        input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 25px;
            outline: none;
        }

        .send-btn {
            background: var(--sent);
            color: white;
            border: none;
            width: 35px; height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="header">
        <button id="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>
        <img src="Michael B_ Jordan.jpg" onerror="this.src='https://ui-avatars.com/api/?name=MBJ&background=007aff&color=fff'">
        <div style="font-size: 11px; margin-top: 5px; opacity: 0.7;">Michael B. Jordan ></div>
    </div>

    <div id="chat-thread">
        <div class="bubble received">Yo! Big love for the support on the Oscar win. What's on your mind?</div>
    </div>

    <div class="input-wrap">
        <input type="text" id="userInput" placeholder="iMessage" onkeypress="if(event.key==='Enter')send()">
        <button class="send-btn" onclick="send()">↑</button>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        async function send() {
            const input = document.getElementById('userInput');
            const thread = document.getElementById('chat-thread');
            const val = input.value.trim();
            if(!val) return;

            thread.innerHTML += `<div class="bubble sent">${val}</div>`;
            input.value = '';
            thread.scrollTop = thread.scrollHeight;

            const tempId = "id" + Date.now();
            thread.innerHTML += `<div class="bubble received" id="${tempId}">...</div>`;

            try {
                const res = await fetch('https://mbjfansite.richurehan00.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val })
                });
                const text = await res.text();
                document.getElementById(tempId).innerText = text;
            } catch {
                document.getElementById(tempId).innerText = "Delivered";
            }
            thread.scrollTop = thread.scrollHeight;
        }
    </script>
</body>
</html>
