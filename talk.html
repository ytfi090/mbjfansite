<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Michael B. Jordan</title>
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-gray: #e9e9eb;
            --ios-bg: #ffffff;
            --ios-text-dark: #000000;
            --ios-text-light: #ffffff;
        }

        body {
            background-color: var(--ios-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--ios-text-dark);
        }

        /* iMessage Top Bar */
        .header {
            padding: 40px 20px 10px;
            text-align: center;
            border-bottom: 1px solid #dbdbdb;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-bottom: 5px;
            object-fit: cover;
        }

        .header span {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
        }

        /* Message Thread */
        #chat-thread {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px; /* Tight iMessage spacing */
        }

        .bubble {
            max-width: 70%;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
            margin-bottom: 2px;
        }

        /* Michael's Bubble (Received) */
        .ai {
            align-self: flex-start;
            background-color: var(--ios-gray);
            color: var(--ios-text-dark);
            border-bottom-left-radius: 4px;
        }

        /* Your Bubble (Sent) */
        .user {
            align-self: flex-end;
            background-color: var(--ios-blue);
            color: var(--ios-text-light);
            border-bottom-right-radius: 4px;
        }

        /* Input Bar */
        .input-bar {
            padding: 10px 15px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
        }

        input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #dbdbdb;
            outline: none;
            font-size: 1rem;
        }

        .send-btn {
            background-color: var(--ios-blue);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Nav links just for your site structure */
        nav { font-size: 12px; text-align: center; padding: 10px; background: #f2f2f2;}
        nav a { margin: 0 10px; text-decoration: none; color: #007aff; font-weight: bold;}
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="journey.html">Journey</a>
    </nav>

    <div class="header">
        <img src="Michael B_ Jordan.jpg" onerror="this.src='https://ui-avatars.com/api/?name=MBJ&background=007aff&color=fff'">
        <span>Michael B. Jordan ></span>
    </div>

    <div id="chat-thread">
        <div class="bubble ai">Yo! Big love for the support on the Oscar win. What's on your mind?</div>
    </div>

    <div class="input-bar">
        <input type="text" id="userIn" placeholder="iMessage" onkeypress="if(event.key==='Enter')send()">
        <button class="send-btn" onclick="send()">↑</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userIn');
            const thread = document.getElementById('chat-thread');
            const text = input.value.trim();
            if (!text) return;

            // Add user bubble
            thread.innerHTML += `<div class="bubble user">${text}</div>`;
            input.value = '';
            thread.scrollTop = thread.scrollHeight;

            // Add loading state
            const loadingId = "loading-" + Date.now();
            thread.innerHTML += `<div class="bubble ai" id="${loadingId}">...</div>`;
            thread.scrollTop = thread.scrollHeight;

            try {
                const response = await fetch('https://mbjfansite.richurehan00.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const reply = await response.text();
                document.getElementById(loadingId).innerText = reply;
            } catch (err) {
                document.getElementById(loadingId).innerText = "Delivered (tap to retry)";
            }
            thread.scrollTop = thread.scrollHeight;
        }
    </script>
</body>
</html>
