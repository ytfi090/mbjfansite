<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk to Michael | MBJ Fan Experience</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --gold: #c5a059;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px;
            display: flex;
            justify-content: center;
            gap: 40px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--gold);
        }

        /* Chat Container */
        .chat-container {
            max-width: 700px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }

        .chat-wrapper {
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .chat-header {
            padding: 20px;
            background: #000;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #222;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .status-info h3 {
            font-size: 1.1rem;
            margin: 0;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .status-info span {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Message Area */
        #chat-box {
            height: 500px;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #0a0a0a;
            background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .msg {
            padding: 14px 20px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-msg {
            background: #222;
            color: #f0f0f0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user-msg {
            background: var(--gold);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            font-weight: 500;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: #111;
            display: flex;
            gap: 10px;
            border-top: 1px solid #222;
        }

        input {
            flex: 1;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--gold);
        }

        button {
            padding: 0 30px;
            background: var(--gold);
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #e0b970;
            transform: scale(1.02);
        }

        /* Custom Scrollbar */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-track { background: #0a0a0a; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="journey.html">JOURNEY</a>
        <a href="talk.html" class="active">TALK TO MICHAEL</a>
    </nav>

    <div class="chat-container">
        <div class="chat-wrapper">
            <div class="chat-header">
                <img src="Michael B_ Jordan.jpg" alt="Michael B. Jordan" class="avatar">
                <div class="status-info">
                    <h3>Michael B. Jordan</h3>
                    <span><span class="status-dot"></span>Active AI Persona</span>
                </div>
            </div>

            <div id="chat-box">
                <div class="msg ai-msg">Yo! It's Michael. Glad you're here. We can talk about the 2026 Oscar win, my work on the Creed trilogy, or just vibe about some anime. What's on your mind?</div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const message = input.value.trim();

            if (!message) return;

            // Display User Message
            box.innerHTML += `<div class="msg user-msg">${message}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            // Display Loading Indicator
            const loadingId = "loading-" + Date.now();
            box.innerHTML += `<div class="msg ai-msg" id="${loadingId}">...</div>`;
            box.scrollTop = box.scrollHeight;

            try {
                // UPDATE THIS URL to your actual Cloudflare Worker URL
                const response = await fetch('https://mbjfansite.richurehan00.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error("Worker Error");

                const reply = await response.text();
                document.getElementById(loadingId).innerText = reply;

            } catch (err) {
                document.getElementById(loadingId).innerText = "My connection is a bit spotty right now. Try again in a second?";
                console.error(err);
            }
            
            box.scrollTop = box.scrollHeight;
        }

        // Allow 'Enter' key to send message
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
