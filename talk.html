<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with MBJ | 2026 Oscar Edition</title>
    <style>
        :root { --gold: #c5a059; --bg: #050505; --card: #111; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        nav { padding: 20px; display: flex; justify-content: center; gap: 30px; background: #000; border-bottom: 1px solid #222; }
        nav a { color: #888; text-decoration: none; font-weight: bold; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--gold); }

        .chat-container { flex: 1; max-width: 800px; margin: 40px auto; width: 95%; display: flex; flex-direction: column; background: var(--card); border-radius: 24px; border: 1px solid #222; overflow: hidden; }
        
        .chat-header { padding: 20px; background: #000; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; background: #222; }
        
        #chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg { padding: 15px 20px; border-radius: 18px; max-width: 80%; line-height: 1.5; font-size: 1rem; position: relative; }
        .ai { align-self: flex-start; background: #222; border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: var(--gold); color: #000; font-weight: 600; border-bottom-right-radius: 4px; }

        .input-wrap { padding: 20px; background: #000; border-top: 1px solid #222; display: flex; gap: 12px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 12px; color: #fff; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--gold); }
        button { background: var(--gold); color: #000; border: none; padding: 0 25px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); background: #e0b970; }

        /* Fancy Scrollbar */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="journey.html">JOURNEY</a>
        <a href="talk.html" class="active">TALK TO MICHAEL</a>
    </nav>

    <div class="chat-container">
        <div class="chat-header">
            <img src="hero.jpg" onerror="this.src='https://ui-avatars.com/api/?name=MBJ&background=c5a059&color=fff'" class="avatar">
            <div>
                <h2 style="margin:0; font-size: 1.2rem;">Michael B. Jordan</h2>
                <small style="color: #00ff00; letter-spacing: 1px;">● OSCAR WINNER 2026</small>
            </div>
        </div>

        <div id="chat-box">
            <div class="msg ai">Yo! Big love for stopping by. Winning that Oscar for 'Sinners' was a dream, but talking to the fans is what keeps me grounded. What's on your mind?</div>
        </div>

        <div class="input-wrap">
            <input type="text" id="user-input" placeholder="Message Michael..." autocomplete="off">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const msg = input.value.trim();
            if (!msg) return;

            // User Message
            box.innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            // Typing Indicator
            const tid = "t-" + Date.now();
            box.innerHTML += `<div class="msg ai" id="${tid}">Typing...</div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('https://mbjfansite.richurehan00.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });

                if (!response.ok) throw new Error();
                const reply = await response.text();
                document.getElementById(tid).innerText = reply;

            } catch (err) {
                document.getElementById(tid).innerHTML = "My signal is weak on set right now. Hit me up again in a minute?";
            }
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
